name: SEO Automation

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - 'sitemap.xml'

jobs:
  seo-checks:
    name: SEO Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate SEO and Social Tags
        run: |
          echo "Checking HTML files for critical SEO, Social, and Mobile tags..."
          MISSING_TAGS=0

          # Find all HTML files
          find . -name "*.html" -not -path "*/\.git/*" | while read file; do
            # Check for <title>
            if ! grep -qi "<title>" "$file"; then
              echo "❌ Missing <title> in $file"
              MISSING_TAGS=1
            fi

            # Check for meta description
            if ! grep -qi "name=\"description\"" "$file"; then
              echo "❌ Missing <meta name=\"description\"> in $file"
              MISSING_TAGS=1
            fi
            
            # Check for viewport (Mobile)
            if ! grep -qi "name=\"viewport\"" "$file"; then
              echo "❌ Missing <meta name=\"viewport\"> in $file"
              MISSING_TAGS=1
            fi

            # Check for Canonical Link
            if ! grep -qi "rel=\"canonical\"" "$file"; then
              echo "❌ Missing <link rel=\"canonical\"> in $file"
              MISSING_TAGS=1
            fi

            # Check for OpenGraph Title
            if ! grep -qi "property=\"og:title\"" "$file"; then
              echo "❌ Missing <meta property=\"og:title\"> in $file"
              MISSING_TAGS=1
            fi
            
            # Check for OpenGraph Description
            if ! grep -qi "property=\"og:description\"" "$file"; then
              echo "❌ Missing <meta property=\"og:description\"> in $file"
              MISSING_TAGS=1
            fi
            
            # Check for OpenGraph Image
            if ! grep -qi "property=\"og:image\"" "$file"; then
              echo "❌ Missing <meta property=\"og:image\"> in $file"
              MISSING_TAGS=1
            fi
          done

          if [ $MISSING_TAGS -ne 0 ]; then
            echo "❌ SEO Linter failed. Critical tags are missing."
            exit 1
          else
            echo "✅ All HTML files pass the comprehensive SEO linter."
          fi

  update-sitemap-and-ping:
    name: Generate Sitemap & Ping
    runs-on: ubuntu-latest
    needs: seo-checks
    permissions:
      contents: write # Needed to push changes back to the repository
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to accurately determine last modified dates for files via git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Sitemap
        run: python3 scripts/generate-sitemap.py

      - name: Commit and Push Sitemap if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to sitemap.xml. Everything is up to date."
          else
            git commit -m "chore: auto-update sitemap.xml"
            git push
            echo "✅ Automatically committed and pushed updated sitemap.xml."
          fi

      - name: Notify IndexNow
        run: |
          echo "Extracting URLs from sitemap and pinging IndexNow..."
          python3 -c '
          import xml.etree.ElementTree as ET
          import json, urllib.request

          tree = ET.parse("sitemap.xml")
          root = tree.getroot()
          ns = {"ns": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          urls = [loc.text for loc in root.findall(".//ns:loc", ns)]
          
          payload = {
              "host": "gunzino.me",
              "key": "6eef46c2de984bb3906a59918731737e",
              "keyLocation": "https://gunzino.me/6eef46c2de984bb3906a59918731737e.txt",
              "urlList": urls
          }
          
          req = urllib.request.Request("https://api.indexnow.org/indexnow", 
                                       data=json.dumps(payload).encode("utf-8"),
                                       headers={"Content-Type": "application/json; charset=utf-8"})
          try:
              with urllib.request.urlopen(req) as response:
                  print(f"✅ Successfully pinged IndexNow (Status {response.status})")
          except Exception as e:
              print(f"⚠️ IndexNow ping failed: {e}")
          '

          echo "Note: Google relies on Search Console + standard crawling."
